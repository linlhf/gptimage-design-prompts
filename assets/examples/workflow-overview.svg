<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">GPT Image Design Prompts workflow overview</title>
  <desc id="desc">A four-step workflow from design input to Codex prompt, ChatGPT image generation, and optional Photoshop or API output.</desc>
  <defs>
    <style>
      .bg{fill:#f7f5ef}
      .card{fill:#fffdf8;stroke:#2c2c2c;stroke-width:2}
      .accent{fill:#d8f0e1;stroke:#2c2c2c;stroke-width:2}
      .warm{fill:#f6d9bd;stroke:#2c2c2c;stroke-width:2}
      .cool{fill:#dce7f7;stroke:#2c2c2c;stroke-width:2}
      .ink{fill:#252525;font-family:Inter,Arial,sans-serif}
      .muted{fill:#626262;font-family:Inter,Arial,sans-serif}
      .mono{fill:#303030;font-family:Menlo,Consolas,monospace}
      .line{stroke:#2c2c2c;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke:#2c2c2c;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2c2c2c"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="520"/>
  <text class="ink" x="60" y="68" font-size="34" font-weight="700">Design prompt workflow</text>
  <text class="muted" x="60" y="104" font-size="18">Codex writes the prompt. ChatGPT generates the image. Photoshop or API can finish the production loop.</text>

  <rect class="card" x="60" y="160" width="225" height="230" rx="18"/>
  <text class="ink" x="88" y="202" font-size="22" font-weight="700">1. Design input</text>
  <text class="muted" x="88" y="236" font-size="16">Sketch, plan, model,</text>
  <text class="muted" x="88" y="260" font-size="16">photo, moodboard,</text>
  <text class="muted" x="88" y="284" font-size="16">or material reference</text>
  <rect class="cool" x="92" y="315" width="72" height="46" rx="8"/>
  <path class="thin" d="M105 348 L123 330 L139 344 L150 335"/>
  <circle cx="112" cy="327" r="5" fill="#2c2c2c"/>
  <rect class="warm" x="176" y="315" width="72" height="46" rx="8"/>
  <path class="thin" d="M188 350 L236 350 M190 335 L234 335 M198 322 L198 358 M222 322 L222 358"/>

  <path class="line" marker-end="url(#arrow)" d="M300 275 H375"/>

  <rect class="accent" x="390" y="160" width="225" height="230" rx="18"/>
  <text class="ink" x="418" y="202" font-size="22" font-weight="700">2. Codex skill</text>
  <text class="muted" x="418" y="236" font-size="16">Compiles intent into</text>
  <text class="muted" x="418" y="260" font-size="16">a GPT Image 2 prompt</text>
  <rect x="422" y="300" width="160" height="64" rx="10" fill="#fffdf8" stroke="#2c2c2c" stroke-width="2"/>
  <text class="mono" x="442" y="326" font-size="14">Preserve layout</text>
  <text class="mono" x="442" y="348" font-size="14">Apply materials</text>

  <path class="line" marker-end="url(#arrow)" d="M630 275 H705"/>

  <rect class="card" x="720" y="160" width="225" height="230" rx="18"/>
  <text class="ink" x="748" y="202" font-size="22" font-weight="700">3. ChatGPT</text>
  <text class="muted" x="748" y="236" font-size="16">Paste the prompt</text>
  <text class="muted" x="748" y="260" font-size="16">with reference images</text>
  <rect x="755" y="300" width="155" height="64" rx="10" fill="#d8f0e1" stroke="#2c2c2c" stroke-width="2"/>
  <circle cx="785" cy="332" r="16" fill="#f6d9bd" stroke="#2c2c2c" stroke-width="2"/>
  <path class="thin" d="M812 345 C832 312 856 312 880 345"/>

  <path class="line" marker-end="url(#arrow)" d="M960 275 H1035"/>

  <rect class="cool" x="1050" y="160" width="100" height="100" rx="18"/>
  <text class="ink" x="1074" y="204" font-size="18" font-weight="700">PS</text>
  <text class="muted" x="1070" y="232" font-size="13">handoff</text>
  <rect class="warm" x="1050" y="290" width="100" height="100" rx="18"/>
  <text class="ink" x="1072" y="334" font-size="18" font-weight="700">API</text>
  <text class="muted" x="1067" y="362" font-size="13">optional</text>

  <text class="muted" x="60" y="455" font-size="16">Default path: copy prompt to ChatGPT. Optional paths: Photoshop compositing or local API generation.</text>
</svg>
